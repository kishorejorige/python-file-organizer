[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "python-file-organizer"
version = "1.0.0"
description = "Organize files automatically by extension"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools]
packages = ["organizer"]

[project.scripts]
file-organizer = "organizer.main:main"