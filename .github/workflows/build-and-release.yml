name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pyinstaller

      - name: Build sdist and wheel
        run: |
          python -m build --sdist --wheel

      - name: Build single-file executable (PyInstaller)
        run: |
          # Put pyinstaller output in a per-os folder
          OUT=dist/pyinstaller-${{ matrix.os }}
          mkdir -p "$OUT"
          pyinstaller --onefile --name file-organizer --distpath "$OUT" organizer/cli.py

      - name: List dist
        run: ls -la dist || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            dist/

  release:
    name: Create GitHub Release and attach artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git for-each-ref --sort=-taggerdate --format '%(refname:short)' refs/tags | sed -n '2p' || true)
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:'- %s (%h)' HEAD > /tmp/release_notes.txt
          else
            git log ${PREV_TAG}..HEAD --pretty=format:'- %s (%h)' > /tmp/release_notes.txt
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          RELEASE_ID=${{ steps.create_release.outputs.id }}
          echo "Uploading assets to release $RELEASE_ID"
          for f in $(find artifacts -type f); do
            echo "Uploading $f"
            gh release upload ${{ github.ref_name }} "$f" || \
              curl -sS -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$f" "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$(basename $f)"
          done
        shell: bash
