name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pyinstaller

      - name: Build sdist and wheel
        run: |
          python -m build --sdist --wheel

      - name: Build single-file executable (PyInstaller)
        run: |
          # Put pyinstaller output in a per-os folder
          OUT=dist/pyinstaller-${{ matrix.os }}
          mkdir -p "$OUT"
          pyinstaller --onefile --name file-organizer --distpath "$OUT" organizer/cli.py

      - name: List dist
        run: ls -la dist || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            dist/

  release:
    name: Create GitHub Release and attach artifacts
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git for-each-ref --sort=-taggerdate --format '%(refname:short)' refs/tags | sed -n '2p' || true)
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:'- %s (%h)' HEAD > /tmp/release_notes.txt
          else
            git log ${PREV_TAG}..HEAD --pretty=format:'- %s (%h)' > /tmp/release_notes.txt
          fi

      - name: Install GitHub CLI
        run: |
          sudo apt-get update && sudo apt-get install -y gh

      - name: Create GitHub release (gh)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO=${{ github.repository }}
          TAG=${{ github.ref_name }}
          gh auth setup-git
          gh release create "$TAG" --repo "$REPO" --title "$TAG" --notes-file /tmp/release_notes.txt || true

      - name: Upload release assets (gh)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          echo "Uploading assets to release $TAG"
          for f in $(find artifacts -type f); do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" || echo "upload failed for $f"
          done
        shell: bash
